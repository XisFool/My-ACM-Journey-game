<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player 1 Adventure</title>
  <!-- Font Awesome CDN for the icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glass-container">
    
    <div class="content-top">
      <h1 class="main-text">Player 1</h1>
      <h2 class="sub-text">start your adventure</h2>
      
      <div class="hero-cta">
        <button class="hero-cta-btn btn-left">Press Start</button>
        <button class="hero-cta-btn btn-right">Continue</button>
      </div>
    </div>
    
    <!-- Move Mouse to Explore Text -->
    <div class="explore-container">
      <div class="explore-text">move mouse to explore</div>
    </div>
    
    <div class="home-container">
      <!-- Home container wrapper for animation separation -->
      <div class="home-wrapper">
        <a href="../index.html" class="home-btn" title="Back to Home">
          <i class="fa-solid fa-house"></i>
        </a>
      </div>
    </div>

  </div>

</html>
