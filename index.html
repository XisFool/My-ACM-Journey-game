<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="我的ACM旅途 - 一个像素风传记游戏，记录我的算法竞赛之路">
    <title>我的ACM旅途 | My ACM Journey</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts（国内镜像） -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- ====== HTML 主菜单遮罩层 ====== -->
    <div id="menu-overlay">
        <div class="glass-container">
            <button id="theme-toggle" title="Switch Day/Night"><i class="fa-solid fa-moon"></i></button>
            <div class="content-top">
                <h1 class="main-text">Player 1</h1>
                <h2 class="sub-text">start your adventure</h2>
                <div class="hero-cta">
                    <button class="hero-cta-btn btn-left" id="btn-start">Press Start</button>
                    <button class="hero-cta-btn btn-right" id="btn-continue">Continue</button>
                </div>
            </div>
            <div class="explore-container">
                <div class="explore-text">move mouse to explore</div>
            </div>
        </div>

        <!-- ====== Project 面板 (全屏 3D Intro) ====== -->
        <!-- 内部 DOM 由 js/ui/ProjectPage.js 在打开时动态构建 -->
        <div id="project-overlay" class="hidden">
            <button class="project-close" id="project-close-btn">&times;</button>
        </div>

        <div class="home-container">
            <div class="home-wrapper">
                <span class="btn-label">Home</span>
                <a href="#" class="home-btn" id="menu-home-btn">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
            <div class="home-wrapper">
                <span class="btn-label">Projects</span>
                <a href="#" class="project-btn" id="menu-project-btn">
                    <i class="fa-solid fa-box"></i>
                </a>
            </div>
            <div class="home-wrapper">
                <span class="btn-label">About</span>
                <a href="#" class="profile-btn" id="menu-profile-btn">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Profile 面板（内部 DOM 由 js/ui/ProfilePanel.js 动态挂载） -->
    <div id="profile-overlay" class="profile-overlay hidden"></div>

    <!-- 游戏内 Home 按钮（DOM 层，与菜单 Home 统一设计） -->
    <div id="game-home-container" class="game-home-container" style="display:none;">
        <a href="#" class="home-btn" id="game-home-btn" title="Back to Home">
            <i class="fa-solid fa-house"></i>
        </a>
    </div>

    <!-- Phaser 游戏容器 -->
    <div id="game-container"></div>

    <!-- 主菜单交互总入口（主题切换 / 面板开关 / proximity / Press Start） -->
    <script type="module" src="js/ui/MenuController.js"></script>

    <!-- 加载 Phaser (优先本地，失败则跳转 CDN 备用) -->
    <script src="js/libs/phaser.min.js"></script>
    <script>
        if (typeof Phaser === 'undefined') {
            document.write('<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"><\/script>');
        }
    </script>

    <!-- 全局报错捕捉 -->
    <script>
        window.addEventListener('error', function(e) {
            console.log('Resource/Script Error detected:', e.target.src || e.target.href || e.message);
        }, true);
    </script>

    <!-- 以 ES Module 方式加载游戏脚本 -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
